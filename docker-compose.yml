# docker-compose.yml
# WHY (KR): v1 мҠӨмҪ”н”„ - PostgreSQL + pgvectorл§Ң м»Ён…Ңмқҙл„Ҳнҷ”.
# OllamaлҠ” нҳёмҠӨнҠё(WSL2) м§ҒкІ°, FastAPIлҠ” uv runмңјлЎң лЎңм»¬ мӢӨн–ү.

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: multi-agent-rag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # WHY (KR): pg_isreadyлЎң мҝјлҰ¬ мҲҳмӢ  мӨҖл№„ мғҒнғңк№Ңм§Җ нҷ•мқё.
      # v2м—җм„ң FastAPI м»Ён…Ңмқҙл„Ҳ м¶”к°Җ мӢң depends_on м—°кІ° лҢҖл№„.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata: